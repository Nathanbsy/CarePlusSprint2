<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Login - Care Plus Agenda Viva</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="css/styles.css" rel="stylesheet">
</head>
<body>
  <main class="min-vh-100 d-flex align-items-center py-5">
    <div class="container">
      <div class="row justify-content-center">
        <div class="col-md-8 col-lg-5">
          <div class="text-center mb-4">
            <a class="navbar-brand d-inline-flex align-items-center gap-2 fw-bold" href="index.html">
              <span class="brand-mark">CPA</span>
              Care Plus Agenda Viva
            </a>
          </div>
          <div class="soft-card p-4 p-md-5">
            <p class="small-label">Acesso do paciente</p>
            <h1 class="h3 fw-bold mb-3">Entrar na sua agenda</h1>
            <p class="text-secondary">Use qualquer nome e e-mail para simular a jornada do prototipo.</p>
            <form id="loginForm" class="mt-4">
              <div class="mb-3">
                <label class="form-label" for="name">Nome</label>
                <input class="form-control form-control-lg" id="name" type="text" placeholder="Seu nome" required>
              </div>
              <div class="mb-3">
                <label class="form-label" for="email">E-mail</label>
                <input class="form-control form-control-lg" id="email" type="email" placeholder="voce@email.com" required>
              </div>
              <div class="mb-4">
                <label class="form-label" for="password">Senha</label>
                <input class="form-control form-control-lg" id="password" type="password" placeholder="123456" required>
              </div>
              <button class="btn btn-primary btn-lg w-100" type="submit">Entrar</button>
            </form>
          </div>
          <p class="text-center text-secondary mt-3 mb-0">Protótipo acadêmico para o Challenge Care Plus.</p>
        </div>
      </div>
    </div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
